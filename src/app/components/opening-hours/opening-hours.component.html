<section class="hours-section">

  <div class="hours-inner">

    <div class="hours-card">
      <span class="eyebrow">— Åpningstider</span>
      <h2 class="card-title">NÅR VI <mark class="highlight">HOLDER</mark> ÅPENT</h2>

      <div class="hours-list">
        <div
          class="hours-row"
          *ngFor="let h of hours"
          [class.highlight-row]="h.highlight">
          <span class="hours-day">{{ h.day }}</span>
          <span class="hours-divider"></span>
          <span class="hours-time" [class.buffet]="h.highlight">{{ h.time }}</span>
          <span class="buffet-tag" *ngIf="h.highlight">Søndagsbuffet</span>
        </div>
      </div>

      <div class="contact-row">
        <span class="contact-label">Ring oss</span>
        <a href="tel:37098898" class="contact-phone">37 09 88 98</a>
      </div>

      <div class="address-row">
        <span class="contact-label">Adresse</span>
        <span class="contact-phone">Østre gate 1, Arendal</span>
      </div>

      <a href="tel:37098898" class="btn-call">BESTILL BORD</a>
    </div>

    <div class="hours-image">
      <img src="assets/restaurant-interior.jpg" alt="Restauranten innvendig">
      <div class="image-caption">
        <span>Hong Kong Restaurant · Arendal</span>
      </div>
    </div>

  </div>
</section>
